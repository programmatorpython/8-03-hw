vrrp_script check_web {
    script "/usr/local/bin/check_web.sh"
    interval 3
    weight -10
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth1
    virtual_router_id 15
    priority 95
    advert_int 1

    virtual_ipaddress {
        192.168.0.100/24
    }

    track_script {
        check_web
    }
}